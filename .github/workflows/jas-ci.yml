name: JAS verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, pcntl
          coverage: none

      - name: Install verified PHPStan PHAR
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/phpstan/phpstan/releases/download/2.1.56/phpstan.phar \
            --output /tmp/phpstan.phar
          echo "d9d42305ea80cd33cd4c3fb2699b5a3a563d9cf65b4320107071facf4201a294  /tmp/phpstan.phar" | sha256sum --check --strict

      - name: Static analysis
        run: JAS_PHPSTAN=/tmp/phpstan.phar php bin/jas static

      - name: Test suite
        run: php tests/run_all.php
