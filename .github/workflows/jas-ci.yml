name: JAS verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, pcntl
          coverage: none

      - name: Install verified PHPStan PHAR
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/phpstan/phpstan/releases/download/2.1.56/phpstan.phar \
            --output /tmp/phpstan.phar
          echo "d9d42305ea80cd33cd4c3fb2699b5a3a563d9cf65b4320107071facf4201a294  /tmp/phpstan.phar" | sha256sum --check --strict

      - name: Static analysis
        run: JAS_PHPSTAN=/tmp/phpstan.phar php bin/jas static

      - name: Test suite
        run: php tests/run_all.php

  lsp-linux-x86-64:
    name: LSP Linux x86-64 package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: sodium, pcntl
          coverage: none

      - name: Install external bridge build requirements
        run: sudo apt-get update && sudo apt-get install --yes g++ libssl-dev rapidjson-dev libzstd-dev zlib1g-dev

      - name: Verify protocol and client profiles
        run: make -C sdk/cpp/lsp test

      - name: Download verified Neovim 0.12.4 portable client
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/neovim/neovim/releases/download/v0.12.4/nvim-linux-x86_64.tar.gz \
            --output /tmp/nvim-linux-x86_64.tar.gz
          echo "012bf3fcac5ade43914df3f174668bf64d05e049a4f032a388c027b1ebd78628  /tmp/nvim-linux-x86_64.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/nvim-linux-x86_64.tar.gz -C /tmp

      - name: Verify real Neovim client lifecycle and hover
        run: tests/test_jas_lsp_neovim.sh /tmp/nvim-linux-x86_64/bin/nvim sdk/cpp/lsp/jas-lsp-bridge

      - name: Verify reproducible signed package flow
        run: tests/test_jas_lsp_distribution.sh

      - name: Build release package
        run: SOURCE_DATE_EPOCH=1700000000 JAS_SOURCE_REVISION="$GITHUB_SHA" sdk/cpp/lsp/package.sh dist

      - name: Attest release provenance
        if: github.event_name == 'push'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*.tar.gz

      - name: Upload verified package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jas-lsp-linux-x86-64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
